<!DOCTYPE html>
<html lang="tr" class="scroll-smooth">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ site.title }} | {{ site.subtitle }}</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						darkBg: '#0b0f19',
						cardBg: '#131c2e',
						accent: '#10b981',
						accentHover: '#059669'
					}
				}
			}
		}
	</script>
	<style>
		.glow-effect:hover {
			box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
			transform: translateY(-2px);
		}

		/* Custom styles for rendered markdown content */
		.markdown-content h2 {
			font-size: 1.25rem;
			font-weight: 700;
			text-transform: uppercase;
			tracking: 0.05em;
			color: white;
			border-left: 4px solid #10b981;
			padding-left: 0.75rem;
			margin-top: 3rem;
			margin-bottom: 1.5rem;
		}

		.markdown-content p.summary {
			color: #94a3b8;
			text-align: justify;
			background: #131c2e;
			padding: 1.5rem;
			border-radius: 0.75rem;
			border: 1px solid rgba(51, 65, 85, 0.6);
			line-height: 1.625;
		}
	</style>
</head>

<body class="bg-darkBg text-slate-200 antialiased selection:bg-emerald-500 selection:text-white">

	<div class="max-w-4xl mx-auto px-4 py-12 md:py-20">

		<!-- Header Section -->
		<header
			class="text-center md:text-left md:flex md:items-center md:justify-between border-b border-slate-800 pb-10">
			<div>
				<h1 class="text-4xl md:text-5xl font-black tracking-tight text-white uppercase">
					{{ site.title }}
				</h1>
				<p class="text-lg md:text-xl font-semibold text-emerald-400 mt-2 tracking-wide">
					{{ site.subtitle }}
				</p>
				<div class="flex flex-wrap justify-center md:justify-start gap-4 mt-5 text-sm text-slate-400">
					<span><i class="fa-solid fa-location-dot text-emerald-400 mr-1"></i> {{ site.location }}</span>
					<a href="mailto:{{ site.email }}" class="hover:text-white transition"><i
							class="fa-solid fa-envelope text-emerald-400 mr-1"></i> {{ site.email }}</a>
					<a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank"
						class="hover:text-white transition"><i class="fa-brands fa-linkedin text-emerald-400 mr-1"></i>
						LinkedIn</a>
					<a href="{{ site.personal_website }}" target="_blank" class="hover:text-white transition"><i
							class="fa-solid fa-globe text-emerald-400 mr-1"></i> Website</a>
				</div>
			</div>
		</header>

		<!-- Dynamic Markdown Content Area -->
		<main class="markdown-content mt-12">
			{{ content }}
		</main>

		<!-- Featured Projects (Automated GitHub Fetch) -->
		<section class="mt-12">
			<h2 class="text-xl font-bold tracking-wider text-white uppercase border-l-4 border-emerald-500 pl-3 mb-6">
				Featured Repositories
			</h2>
			<div id="github-projects" class="grid grid-cols-1 md:grid-cols-2 gap-4">
				<div class="bg-cardBg border border-slate-800/40 p-5 rounded-xl animate-pulse text-slate-500">Loading
					open-source projects...</div>
			</div>
		</section>

		<footer class="text-center text-xs text-slate-600 mt-16 pt-6 border-t border-slate-950">
			&copy; 2026 {{ site.title }}. Powered by GitHub Pages & Jekyll.
		</footer>

	</div>

	<!-- GitHub API Script -->
	<script>
		const githubUsername = "{{ site.github_username }}";

		async function fetchRepos() {
			try {
				const response = await fetch(`https://api.github.com/users/${githubUsername}/repos?sort=updated&per_page=6`);
				const repos = await response.json();
				const container = document.getElementById('github-projects');
				container.innerHTML = '';

				if (repos.message === "Not Found" || repos.length === 0) {
					container.innerHTML = '<p class="text-sm text-slate-500 col-span-2">No public projects found.</p>';
					return;
				}

				repos.forEach(repo => {
					if (!repo.fork) {
						const card = document.createElement('a');
						card.href = repo.html_url;
						card.target = "_blank";
						card.className = "bg-cardBg border border-slate-800/40 p-5 rounded-xl glow-effect transition duration-300 block";
						card.innerHTML = `
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-white font-bold text-sm hover:text-emerald-400 transition">${repo.name}</h4>
                                <span class="text-[10px] text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full font-mono"><i class="fa-solid fa-star mr-1"></i>${repo.stargazers_count}</span>
                            </div>
                            <p class="text-xs text-slate-400 line-clamp-2 h-8 mb-3">${repo.description || 'No description provided.'}</p>
                            <div class="text-[11px] text-slate-500 font-mono">${repo.language || 'Mixed'}</div>
                        `;
						container.appendChild(card);
					}
				});
			} catch (error) {
				console.error("Error fetching GitHub repos:", error);
			}
		}
		fetchRepos();
	</script>
</body>

</html>
